<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Aprendendo Bootstrap 4.6 no UniSENAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container bg-light my-2 pb-4 border">
        <h2 class="h2 text-center p-3">Imagem Responsiva</h2>
        <div class="row">
            <div class="col-4 offset-4 text-center">
                <img src="coruja.webp" alt="coruja" class="img-fluid" width="200">
            </div>
        </div>
    </div>
    <div class="container bg-light my-2 pb-4 border">
        <h2 class="h2 text-center p-3">Imagem Centralizada</h2>
        <img src="coruja.webp" alt="coruja" class="mx-auto d-block" width="200">
    </div>
    <div class="container bg-light my-2 pb-4 border">
        <h2 class="h2 text-center p-3">Imagem com Bordas Arredondadas</h2>
        <img src="coruja.webp" alt="coruja" class="rounded" width="200">
    </div>
    <div class="container bg-light my-2 pb-4 border">
        <h2 class="h2 text-center p-3">Imagem Circular</h2>
        <img src="coruja.webp" alt="coruja" class="rounded-circle" width="200">
    </div>
    <div class="container clearfix bg-light my-2 pb-4 border"> <!-- o clearfix é necessário para enxergar essas imagens "float", que geralmente saem do fluxo normal do documento. -->
        <h2 class="h2 text-center p-3">Imagens Alinhadas</h2>
        <img src="coruja.webp" alt="coruja" class="float-left" width="200" height="200">
        <img src="coruja.webp" alt="coruja" class="float-right" width="200">
    </div>
    <div class="container bg-light my-3 pb-4 border rounded">
        <div class="row">
            <div class="col-6 my-3">
                <h3 class="h3">Paginação</h3>
                <ul class="pagination">
                    <li class="page-item"><a href="index.html" class="page-link">Anterior</a></li>
                    <li class="page-item"><a href="index.html" class="page-link">1</a></li>
                    <li class="page-item"><a href="#" class="page-link text-muted">2</a></li>
                    <li class="page-item"><a href="index3.html" class="page-link">3</a></li>
                    <li class="page-item"><a href="index3.html" class="page-link">Próxima</a></li>
                </ul>
            </div>
        </div>
    </div>
    
    <!-- JQuery e Bootstrap (incluindo Popper)-->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
