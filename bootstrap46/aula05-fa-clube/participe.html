<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Blue Prince | Fã-Clube</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body class="bg-dark text-light">
  <header class="jumbotron bg-primary bg-header text-center shadow-primary">
    <div class="row">
      <div class="col-md-4">
        <h1 class="h1">Blue Prince<br>Fã-Clube</h1>
      </div>
      <div class="col-md-7">
        <nav class="navbar navbar-expand-md navbar-light bg-light d-flex justify-content-center">
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span
              class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Página Inicial</a>
              </li>
              <li class="nav-item  active">
                <a class="nav-link" href="participe.html">Participe <span class="sr-only"></span></a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </div>
  </header>
  <section>
    <div class="container bg-secondary shadow-danger my-4"></div>
    <div class="row m-0">
      <div class="col-md-6 offset-md-3 my-3">
        <div class="card animated h-100 bg-secondary border border-dark">
          <div class="card-header text-center">
            <h3 class="h3">Participe do Clube!</h3>
          </div>
          <div class="card-body h-100 text-center">
            <p class="mt-3 text-justify mx-3">Preencha os dados abaixo se quer receber um e-mail de acesso ao nosso
              clube de Blue Prince:</p>
            <form>
              <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" class="form-control" placeholder="Digite seu nome">
              </div>
              <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" class="form-control" placeholder="Digite seu email">
              </div>
              <div class="form-group">
                <label for="fone">Telefone:</label>
                <input type="tel" id="fone" class="form-control" placeholder="Digite seu telefone">
              </div>
              <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Desejo receber novidades sobre o clube</label>
              </div>
              <button type="submit" class="btn btn-primary">Participar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    </div>
  </section>
  <footer class="text-center mt-4 p-3 bg-primary">
    Site feito por Gustavo Tamanini
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
    crossorigin="anonymous"></script>
  <script src="js/script.js"></script>
</body>
</html>
